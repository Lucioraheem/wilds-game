<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WILDS 3D — Survival Sandbox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;overflow:hidden;width:100vw;height:100dvh;font-family:'Arial',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;position:fixed}
#gameContainer{position:fixed;top:0;left:0;width:100%;height:100%}
canvas{display:block}

/* ══ HUD ══ */
#topBar{position:fixed;top:8px;left:8px;right:8px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;z-index:10;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,transparent 100%);gap:8px;border-radius:12px}
.hudCard{background:rgba(8,8,25,.82);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:8px 12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.5)}
#playerCard{display:flex;align-items:center;gap:8px;min-width:130px}
#playerIcon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.icon-warrior{background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 0 15px rgba(59,130,246,.5)}
#playerInfo{display:flex;flex-direction:column;gap:1px}
#pName{font-size:10px;font-weight:700;color:#f0e6d3}
#pLevel{font-size:8px;color:#fbbf24;font-weight:600}

#barsCard{display:flex;gap:10px}
.vitalItem{display:flex;flex-direction:column;align-items:center;gap:2px}
.vitalIcon{font-size:13px}
.vitalBarBg{width:44px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.vitalBar{height:100%;border-radius:2px;transition:width .3s}
.vb-hp{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5)}
.vb-st{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5)}
.vitalVal{font-size:7px;color:#888}

#goldPill{padding:4px 10px;border-radius:12px;font-size:9px;font-weight:700;color:#fbbf24;background:rgba(8,8,25,.6);border:1px solid rgba(245,158,11,.2)}

/* ══ JOYSTICK ══ */
#joystickZone{position:fixed;bottom:20px;left:20px;width:110px;height:110px;z-index:20;pointer-events:auto}
#joystickBase{width:110px;height:110px;border-radius:50%;background:rgba(8,8,25,.5);border:2px solid rgba(255,255,255,.1);position:relative}
#joystickKnob{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);position:absolute;top:32px;left:32px;transition:transform .03s}

/* ══ BOTÕES ══ */
#actionButtons{position:fixed;bottom:20px;right:15px;z-index:20;display:flex;gap:8px;align-items:flex-end;pointer-events:auto}
.bigBtn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:26px;border:3px solid rgba(255,255,255,.15);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .1s}
.bigBtn:active{transform:scale(.85)}
#btnAttack{background:linear-gradient(135deg,#ef4444,#dc2626);border-color:#ef4444;box-shadow:0 0 30px rgba(239,68,68,.4);animation:atkGlow 1.5s infinite alternate}
@keyframes atkGlow{from{box-shadow:0 0 18px rgba(239,68,68,.3)}to{box-shadow:0 0 40px rgba(239,68,68,.6)}}
#btnCollect{width:46px;height:46px;background:rgba(8,8,25,.6);border-color:rgba(52,211,153,.5);font-size:20px}

/* ══ FLOATS ══ */
#floatLayer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15}
.fNum{position:absolute;font-weight:900;white-space:nowrap;animation:fUp .7s ease-out forwards;font-family:'Arial',sans-serif}
.fCrit{font-size:24px;color:#fbbf24;text-shadow:0 0 20px #f59e0b}
.fDmg{font-size:14px;color:#fca5a5;text-shadow:0 0 8px #ef4444}
@keyframes fUp{0%{transform:translateY(0)scale(.5);opacity:1}30%{transform:translateY(-30px)scale(1.3)}100%{transform:translateY(-60px)scale(.3);opacity:0}}

#notifs{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:18;pointer-events:none}
.notif{padding:6px 16px;border-radius:14px;font-size:9px;font-weight:600;background:rgba(8,8,25,.9);border:1px solid rgba(255,255,255,.1);animation:notifIn .3s ease;margin-bottom:3px;text-align:center;white-space:nowrap}
@keyframes notifIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="gameContainer"></div>

<div id="topBar">
  <div class="hudCard" id="playerCard">
    <div id="playerIcon" class="icon-warrior">🛡</div>
    <div id="playerInfo"><div id="pName">GUERREIRO</div><div id="pLevel">Nv.<span>1</span></div></div>
  </div>
  <div class="hudCard" id="barsCard">
    <div class="vitalItem"><span class="vitalIcon">❤</span><div class="vitalBarBg"><div class="vitalBar vb-hp" id="hpFill" style="width:100%"></div></div><span class="vitalVal"><span id="hpV">100</span>/<span id="hpM">100</span></span></div>
    <div class="vitalItem"><span class="vitalIcon">💨</span><div class="vitalBarBg"><div class="vitalBar vb-st" id="stFill" style="width:100%"></div></div><span class="vitalVal" id="stV">100</span></div>
  </div>
  <div id="goldPill">💰 <span id="goldV">0</span></div>
</div>

<div id="joystickZone"><div id="joystickBase"><div id="joystickKnob"></div></div></div>

<div id="actionButtons">
  <button class="bigBtn" id="btnCollect" onclick="window.collect()">🌿</button>
  <button class="bigBtn" id="btnAttack" onclick="window.attack()">⚔</button>
</div>

<div id="floatLayer"></div>
<div id="notifs"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════════════
//  WILDS 3D — COM MODELO GLB DO TRIPO
// ═══════════════════════════════════════════════════════════════

const container = document.getElementById('gameContainer');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.FogExp2('#1a1a2e', 0.000012);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 500);
camera.position.set(0, 20, 28);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
container.appendChild(renderer.domElement);

// ── Luzes ──
scene.add(new THREE.AmbientLight('#2a2050', 2.5));
const sun = new THREE.DirectionalLight('#ffeac8', 6);
sun.position.set(40, 50, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
scene.add(new THREE.HemisphereLight('#87ceeb', '#362312', 0.8));

// ── Terreno ──
const groundGeom = new THREE.PlaneGeometry(100, 100, 50, 50);
const ga = groundGeom.attributes.position.array;
for (let i = 0; i < ga.length; i += 3) {
  ga[i + 1] = Math.sin(ga[i] * 0.05) * Math.cos(ga[i + 2] * 0.05) * 1.0 + Math.sin(ga[i] * 0.12) * 0.5;
}
groundGeom.computeVertexNormals();
const ground = new THREE.Mesh(groundGeom, new THREE.MeshStandardMaterial({ color: '#1a1a10', roughness: 0.9 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Árvores ──
const treeGrp = new THREE.Group();
scene.add(treeGrp);
function createTree(x, z) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 2, 6), new THREE.MeshStandardMaterial({ color: '#422010' })));
  const cols = ['#0d3b0d', '#145214', '#1a6b1a'];
  for (let i = 0; i < 3; i++) {
    const c = new THREE.Mesh(new THREE.ConeGeometry(0.9 - i * 0.18, 1.1, 6), new THREE.MeshStandardMaterial({ color: cols[i] }));
    c.position.y = 1.5 + i * 0.7;
    g.add(c);
  }
  g.children[0].position.y = 1;
  g.position.set(x, 0, z);
  return g;
}
for (let i = 0; i < 80; i++) treeGrp.add(createTree((Math.random() - 0.5) * 90, (Math.random() - 0.5) * 90));

// ═══════════════════════════════════════════════════════════════
//  CARREGAR MODELO GLB DO TRIPO
// ═══════════════════════════════════════════════════════════════
const playerGrp = new THREE.Group();
scene.add(playerGrp);

const loader = new GLTFLoader();
let playerModel = null;

// ⚠️ TROQUE 'guerreiro.glb' PELO NOME DO SEU ARQUIVO ⚠️
loader.load(
  'guerreiro.glb',  // ← NOME DO SEU ARQUIVO AQUI
  (gltf) => {
    playerModel = gltf.scene;
    playerModel.scale.set(0.8, 0.8, 0.8);
    playerGrp.add(playerModel);
    notify('✅ Modelo 3D carregado!', '#4ade80');
    console.log('Modelo carregado:', gltf);
  },
  (progress) => {
    const pct = Math.floor((progress.loaded / progress.total) * 100);
    console.log('Carregando modelo... ' + pct + '%');
  },
  (error) => {
    console.error('❌ Erro ao carregar modelo:', error);
    notify('❌ Erro ao carregar modelo! Usando fallback...', '#ef4444');
    createFallbackPlayer();
  }
);

// Fallback se o GLB não carregar
function createFallbackPlayer() {
  const bodyGeom = new THREE.CapsuleGeometry(0.5, 1.2, 8, 16);
  const body = new THREE.Mesh(bodyGeom, new THREE.MeshStandardMaterial({ color: '#3b82f6', roughness: 0.3 }));
  body.position.y = 1.3;
  body.castShadow = true;
  playerGrp.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), new THREE.MeshStandardMaterial({ color: '#ffd5b8', roughness: 0.4 }));
  head.position.y = 2.3;
  playerGrp.add(head);
}

// ── Game State ──
const PL = {
  x: 0, z: 0, vx: 0, vz: 0, angle: 0, spd: 8,
  hp: 100, maxHp: 100, stamina: 100, maxStamina: 100,
  xp: 0, xpNext: 100, level: 1, kills: 0, gold: 0,
  attackDmg: 16, attackRange: 4, critChance: 0.1, attackCD: 0, attackCDMax: 0.4,
  invincible: 0, dead: false, weapons: [], activeWeapon: 0,
  class: 'warrior'
};

// ── Criaturas ──
const creatureGrp = new THREE.Group();
scene.add(creatureGrp);
let creatures = [];

function spawnCreature() {
  const g = new THREE.Group();
  const s = 0.6 + Math.random() * 1.4;
  const colors = ['#ef4444', '#f59e0b', '#8b5cf6', '#06b6d4', '#10b981'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const body = new THREE.Mesh(new THREE.SphereGeometry(s * 0.6, 8, 8), new THREE.MeshStandardMaterial({ color, roughness: 0.35 }));
  body.position.y = s * 0.8;
  g.add(body);
  const eye = new THREE.Mesh(new THREE.SphereGeometry(s * 0.12, 4, 4), new THREE.MeshStandardMaterial({ color: '#fff', emissive: '#fff', emissiveIntensity: 0.7 }));
  eye.position.set(s * 0.22, s * 1.0, s * 0.35);
  g.add(eye);
  const d = 12 + Math.random() * 38, a = Math.random() * Math.PI * 2;
  g.position.set(Math.cos(a) * d, 0, Math.sin(a) * d);
  scene.add(g);
  creatures.push({
    mesh: g, hp: 30 + Math.floor(s * 28), maxHp: 30 + Math.floor(s * 28),
    dmg: 5 + Math.floor(s * 7), spd: 1 + Math.random() * 2, size: s,
    x: g.position.x, z: g.position.z,
    state: 'wander', wAngle: Math.random() * Math.PI * 2, wTimer: 2 + Math.random() * 3, atkTimer: 0
  });
}
for (let i = 0; i < 18; i++) spawnCreature();

// ── Combate ──
function attack() {
  if (PL.dead || PL.attackCD > 0) return;
  PL.attackCD = PL.attackCDMax;
  const crit = Math.random() < PL.critChance;
  const dmg = Math.floor(PL.attackDmg * (crit ? 2.5 : 1));
  let hit = false;
  for (let i = creatures.length - 1; i >= 0; i--) {
    const c = creatures[i];
    if (Math.hypot(PL.x - c.x, PL.z - c.z) < PL.attackRange + c.size) {
      c.hp -= dmg;
      spawnFloat(PL.x, PL.z, dmg, crit ? 'fCrit' : 'fDmg');
      if (c.hp <= 0) {
        PL.kills++;
        PL.xp += 15 + Math.floor(c.size * 5);
        PL.gold += 3 + Math.floor(Math.random() * 18);
        scene.remove(c.mesh);
        creatures.splice(i, 1);
        setTimeout(spawnCreature, 2500 + Math.random() * 4000);
        while (PL.xp >= PL.xpNext) {
          PL.xp -= PL.xpNext;
          PL.level++;
          PL.xpNext = Math.floor(PL.xpNext * 1.25);
          PL.maxHp += 22;
          PL.hp = Math.min(PL.hp + 22, PL.maxHp);
          PL.attackDmg += 4;
          notify('⬆ NÍVEL ' + PL.level + '!', '#fbbf24');
        }
      }
      hit = true;
      break;
    }
  }
  if (!hit) spawnFloat(PL.x, PL.z, 'MISS', 'fDmg');
  updateHUD();
}

function collect() {
  PL.xp += 3;
  PL.gold += 2;
  spawnFloat(PL.x, PL.z, '+2 💰', 'fCrit');
  updateHUD();
}

// ── Floats ──
function spawnFloat(x, z, text, cls) {
  const el = document.getElementById('floatLayer');
  const sx = ((x - camera.position.x) * 14 + innerWidth / 2);
  const sy = (-(z - camera.position.z) * 8 + innerHeight / 2);
  if (sx < -40 || sx > innerWidth + 40 || sy < -40 || sy > innerHeight + 40) return;
  const d = document.createElement('div');
  d.className = 'fNum ' + cls;
  d.textContent = text;
  d.style.left = sx + 'px';
  d.style.top = sy + 'px';
  el.appendChild(d);
  setTimeout(() => d.remove(), 800);
}

function notify(msg, color = '#fbbf24') {
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  n.style.color = color;
  n.style.borderColor = color + '44';
  document.getElementById('notifs').appendChild(n);
  setTimeout(() => n.remove(), 2500);
}

// ── HUD ──
function updateHUD() {
  document.getElementById('hpV').textContent = Math.ceil(PL.hp);
  document.getElementById('hpM').textContent = PL.maxHp;
  document.getElementById('hpFill').style.width = (PL.hp / PL.maxHp * 100) + '%';
  document.getElementById('stV').textContent = Math.ceil(PL.stamina);
  document.getElementById('stFill').style.width = (PL.stamina / PL.maxStamina * 100) + '%';
  document.getElementById('goldV').textContent = PL.gold;
  document.querySelector('#pLevel span').textContent = PL.level;
}

// ── Joystick ──
const joy = { active: false, dx: 0, dy: 0, startX: 0, startY: 0 };
const jKnob = document.getElementById('joystickKnob');
document.getElementById('joystickZone').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const r = document.getElementById('joystickZone').getBoundingClientRect();
  joy.active = true;
  joy.startX = r.left + r.width / 2;
  joy.startY = r.top + r.height / 2;
  joy.dx = 0;
  joy.dy = 0;
  jKnob.style.transform = 'translate(0px,0px)';
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (!joy.active) return;
  const t = e.touches[0];
  let dx = t.clientX - joy.startX, dy = t.clientY - joy.startY;
  const d = Math.hypot(dx, dy), mr = 30;
  if (d > mr) { dx = dx / d * mr; dy = dy / d * mr; }
  joy.dx = dx / mr;
  joy.dy = dy / mr;
  jKnob.style.transform = `translate(${dx}px,${dy}px)`;
}, { passive: false });
window.addEventListener('touchend', () => { joy.active = false; joy.dx = 0; joy.dy = 0; jKnob.style.transform = 'translate(0px,0px)'; });

// ── Teclado ──
const keys = {};
addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'f') attack();
  if (e.key === 'g') collect();
  e.preventDefault();
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ── Game Loop ──
const clock2 = new THREE.Clock();
let spawnTimer = 0;

function update() {
  const dt = Math.min(clock2.getDelta(), 0.1);
  if (!PL.dead) {
    let mx = 0, mz = 0;
    if (keys['w'] || keys['arrowup']) mz -= 1;
    if (keys['s'] || keys['arrowdown']) mz += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (joy.active) { mx = joy.dx; mz = joy.dy; }
    const len = Math.hypot(mx, mz);
    if (len > 0.1) { mx /= len; mz /= len; }
    PL.vx += (mx * PL.spd - PL.vx) * 8 * dt;
    PL.vz += (mz * PL.spd - PL.vz) * 8 * dt;
    PL.x += PL.vx * dt;
    PL.z += PL.vz * dt;
    PL.x = Math.max(-45, Math.min(45, PL.x));
    PL.z = Math.max(-45, Math.min(45, PL.z));
    if (len > 0.1) PL.angle = Math.atan2(mx, mz);
    PL.stamina = Math.min(PL.maxStamina, PL.stamina + 25 * dt);
    if (PL.attackCD > 0) PL.attackCD -= dt;
    if (PL.invincible > 0) PL.invincible -= dt;
    playerGrp.position.set(PL.x, 0, PL.z);
    playerGrp.rotation.y = PL.angle;

    creatures.forEach(c => {
      const dx = PL.x - c.x, dz = PL.z - c.z, dist = Math.hypot(dx, dz);
      if (c.atkTimer > 0) c.atkTimer -= dt;
      if (dist < 10) c.state = 'hunt';
      else if (c.state === 'hunt' && dist > 18) c.state = 'wander';
      if (c.state === 'wander') {
        c.wTimer -= dt;
        if (c.wTimer <= 0) { c.wAngle += Math.random() * Math.PI; c.wTimer = 2 + Math.random() * 3; }
        c.mesh.position.x += Math.cos(c.wAngle) * c.spd * 0.25 * dt;
        c.mesh.position.z += Math.sin(c.wAngle) * c.spd * 0.25 * dt;
      } else {
        const a = Math.atan2(dx, dz);
        c.mesh.position.x += Math.cos(a) * c.spd * dt;
        c.mesh.position.z += Math.sin(a) * c.spd * dt;
        c.mesh.lookAt(PL.x, 0, PL.z);
        if (dist < 2 + c.size && c.atkTimer <= 0 && PL.invincible <= 0) {
          PL.hp -= c.dmg;
          PL.invincible = 0.25;
          spawnFloat(PL.x, PL.z, '-' + c.dmg, 'fDmg');
          c.atkTimer = 1;
          if (PL.hp <= 0) { PL.hp = 0; PL.dead = true; notify('💀 MORREU!', '#ef4444'); }
        }
      }
      c.x = c.mesh.position.x;
      c.z = c.mesh.position.z;
    });

    spawnTimer -= dt;
    if (spawnTimer <= 0 && creatures.length < 20) { spawnCreature(); spawnTimer = 2 + Math.random() * 3; }
    const tx = PL.x + 6, tz = PL.z + 10;
    camera.position.lerp(new THREE.Vector3(tx, 20, tz), 4 * dt);
    camera.lookAt(PL.x, 0, PL.z);
  }
  updateHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

updateHUD();
update();
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

window.attack = attack;
window.collect = collect;

console.log('⚔ WILDS 3D — Aguardando modelo GLB...');
console.log('📂 Coloque o arquivo .glb na mesma pasta do HTML');
console.log('✏️ Troque "guerreiro.glb" pelo nome do seu arquivo');
</script>
</body>
</html>
